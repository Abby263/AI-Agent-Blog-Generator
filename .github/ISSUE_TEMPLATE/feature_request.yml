name: Feature request
description: Propose a focused improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or operator problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - generation
        - evaluation
        - memory
        - approval
        - FastAPI
        - Streamlit
        - Next.js UI
        - deployment
        - documentation
