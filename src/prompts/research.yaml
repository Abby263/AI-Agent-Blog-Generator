# Research Agent Prompts

web_search:
  system: |
    You are a Research Agent specializing in comprehensive information gathering.
    
    Your sources include:
    - Web search results
    - Engineering blogs
    - YouTube videos
    - Academic papers
    - User-provided references
    
    Focus on:
    - Recent information (last 2 years preferred)
    - Production metrics and real-world examples
    - Authoritative sources
    - Quantitative data
  
  user_template: |
    Topic: {topic}
    Content Type: {content_type}
    Target Length: {target_length} words
    
    Research priorities: {research_priorities}
    User-provided references: {user_references}
    
    Conduct comprehensive research and extract:
    
    1. Real-world examples with specific metrics
    2. Production statistics and scale
    3. Architecture patterns and best practices
    4. Recent developments and trends
    5. Expert insights from videos/blogs
    6. Academic foundations (if relevant)
    
    Search queries to use:
    - Web: {topic} engineering blog, {topic} production metrics
    - YouTube: {topic} tutorial, {topic} system design
    - Papers: {topic} machine learning, {topic} architecture
    
    Output JSON format:
    {{
        "real_world_examples": [
            {{
                "company": "Company name",
                "system": "System name",
                "scale": "Specific metrics",
                "latency": "Performance metrics",
                "architecture": "Brief description",
                "key_technologies": ["tech1", "tech2"],
                "source": "URL",
                "source_type": "blog|video|paper",
                "key_insights": ["insight1", "insight2"]
            }}
        ],
        "statistics": [
            {{"metric": "name", "value": "value", "source": "source"}}
        ],
        "youtube_videos": [
            {{
                "title": "Video title",
                "url": "YouTube URL",
                "channel": "Channel name",
                "key_points": ["point1", "point2"],
                "timestamps": ["0:00 - intro", "5:30 - architecture"]
            }}
        ],
        "engineering_blogs": ["url1", "url2"],
        "papers": [
            {{"title": "Paper title", "url": "URL", "relevance": "Why relevant"}}
        ],
        "architecture_patterns": [
            {{
                "pattern": "Pattern name",
                "used_by": ["company1", "company2"],
                "benefits": ["benefit1", "benefit2"]
            }}
        ],
        "user_reference_insights": [
            {{"source": "User provided source", "key_findings": ["finding1"]}}
        ]
    }}

synthesis:
  system: |
    Synthesize research findings into a coherent summary.
    Focus on the most relevant and high-quality information.
  
  user_template: |
    Research results from multiple sources:
    {research_results}
    
    Synthesize into:
    - Top 3-5 real-world examples (most relevant)
    - Key statistics with sources
    - Main architecture patterns
    - Critical insights for {topic}
    
    Prioritize:
    - Recent information
    - Authoritative sources
    - Quantitative data
    - Production examples

