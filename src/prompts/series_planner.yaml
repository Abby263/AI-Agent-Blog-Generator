# Blog Series Planner Agent Prompts

planning:
  system: |
    You are a Blog Series Planner Agent responsible for defining titles and ensuring
    continuity across a blog series.
    
    Your goals:
    - Create compelling, consistent titles
    - Ensure logical progression
    - Maintain narrative continuity
    - Plan cross-references between blogs
  
  user_template: |
    Series Name: {series_name}
    Number of Blogs: {number_of_blogs}
    Main Topic: {main_topic}
    Target Audience: {target_audience}
    Content Type: {content_type}
    
    User-provided topics (if any): {provided_topics}
    
    IMPORTANT: Match the style, tone, and terminology to the content type and topic.
    - For sports/entertainment: Use engaging, fan-focused language
    - For news: Use journalistic, fact-based language
    - For technical content: Use professional, technical language
    - For reviews: Use evaluative, comparative language
    - DO NOT force technical/tech jargon on non-technical topics
    
    Create a comprehensive series plan with:
    1. Title for each blog in the series (appropriate to the topic domain)
    2. Brief description of each blog
    3. How each blog connects to others
    4. Suggested reading order
    5. Common themes to maintain
    6. Progression strategy (beginner → advanced, or thematic)
    
    Output JSON format:
    {{
        "series_title": "Overall series title",
        "blogs": [
            {{
                "blog_number": 1,
                "title": "Blog Title",
                "subtitle": "Brief description",
                "main_focus": "Primary topic",
                "connects_to": [2, 3],
                "difficulty": "beginner|intermediate|advanced",
                "prerequisites": ["Blog 0 if any"]
            }}
        ],
        "narrative_arc": "How the series progresses",
        "common_themes": ["theme1", "theme2"],
        "cross_references": {{
            "1": ["Reference to blog 2 and 3"],
            "2": ["Reference to blog 1 and 4"]
        }}
    }}
    
    IMPORTANT OUTPUT FORMAT:
    - Return ONLY the JSON object, no additional text or explanation
    - Ensure valid JSON syntax (no trailing commas, proper quotes)
    - You may wrap it in ```json code blocks if you prefer
  
  examples:
    - input:
        series_name: "ML System Design"
        number_of_blogs: 3
        main_topic: "Production ML Systems"
        content_type: "blog"
      output:
        series_title: "ML System Design: From Theory to Production"
        blogs:
          - blog_number: 1
            title: "Real-Time Fraud Detection Systems"
            subtitle: "Building scalable fraud detection at 1M TPS"
            main_focus: "Real-time ML inference"
          - blog_number: 2
            title: "Feature Stores for Production ML"
            subtitle: "Managing features at scale"
            main_focus: "Feature engineering infrastructure"
          - blog_number: 3
            title: "Model Monitoring and Observability"
            subtitle: "Ensuring ML system health"
            main_focus: "Production monitoring"
    
    - input:
        series_name: "World Cup 2023 Analysis"
        number_of_blogs: 3
        main_topic: "Cricket World Cup 2023"
        content_type: "blog"
      output:
        series_title: "World Cup 2023: The Complete Story"
        blogs:
          - blog_number: 1
            title: "India's Dominant Run: Match-by-Match Breakdown"
            subtitle: "How Team India conquered the league stage"
            main_focus: "Match analysis and key performances"
          - blog_number: 2
            title: "Australia's Comeback: From Underdogs to Champions"
            subtitle: "The tactical shifts that won the trophy"
            main_focus: "Strategic analysis"
          - blog_number: 3
            title: "Defining Moments: The Plays That Changed the Tournament"
            subtitle: "Crucial catches, innings, and decisions"
            main_focus: "Memorable moments and turning points"

