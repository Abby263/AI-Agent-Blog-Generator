# Content Templates for Different Content Types

# Standard ML System Design Blog Template
ml_system_design:
  name: "ML System Design Blog"
  description: "Comprehensive technical blog for ML system design"
  target_length_range: [8000, 10000]
  
  sections:
    - name: "Table of Contents"
      required: true
      auto_generated: true
      
    - name: "Introduction"
      required: true
      word_count: [500, 800]
      objectives:
        - "Set context and importance"
        - "Provide real-world examples"
        - "Explain problem complexity"
      
    - name: "Problem Statement"
      required: true
      word_count: [800, 1200]
      objectives:
        - "Define use case"
        - "List requirements (functional & non-functional)"
        - "Formulate problem mathematically"
      
    - name: "Feature Engineering"
      required: true
      word_count: [2000, 3000]
      objectives:
        - "Multiple feature categories"
        - "Code implementations"
        - "Feature importance"
      
    - name: "Models"
      required: true
      word_count: [1500, 2000]
      objectives:
        - "Baseline approaches"
        - "ML model options"
        - "Real-world deployments"
      
    - name: "System Design"
      required: true
      word_count: [1500, 2000]
      objectives:
        - "Architecture diagram"
        - "Component descriptions"
        - "Scalability strategies"
      
    - name: "Evaluation and Monitoring"
      required: true
      word_count: [1000, 1500]
      objectives:
        - "Offline metrics"
        - "Online metrics"
        - "Monitoring approaches"
      
    - name: "Case Study"
      required: true
      word_count: [800, 1000]
      objectives:
        - "Concrete example with metrics"
        - "Architecture specifics"
      
    - name: "Best Practices"
      required: true
      word_count: [300, 400]
      
    - name: "Common Mistakes"
      required: true
      word_count: [300, 400]
      
    - name: "Conclusion"
      required: true
      word_count: [200, 300]
      
    - name: "Test Your Learning"
      required: true
      questions: [10, 15]
      
    - name: "References"
      required: true
      min_citations: 20

# News Article Template
news_article:
  name: "News Article"
  description: "Breaking news or current events article"
  target_length_range: [800, 1500]
  
  sections:
    - name: "Headline"
      required: true
      objectives: ["Attention-grabbing, clear"]
      
    - name: "Lead Paragraph"
      required: true
      word_count: [50, 100]
      objectives: ["5 Ws: Who, What, When, Where, Why"]
      
    - name: "Body"
      required: true
      word_count: [500, 1000]
      objectives:
        - "Details and context"
        - "Quotes from sources"
        - "Background information"
      
    - name: "Analysis"
      required: false
      word_count: [200, 300]
      objectives: ["Expert perspective", "Implications"]
      
    - name: "Related Coverage"
      required: true
      objectives: ["Links to related articles"]

# Tutorial Template
tutorial:
  name: "Step-by-Step Tutorial"
  description: "Educational tutorial with hands-on examples"
  target_length_range: [2000, 4000]
  
  sections:
    - name: "Table of Contents"
      required: true
      auto_generated: true
      
    - name: "Introduction"
      required: true
      word_count: [200, 300]
      objectives: ["What you'll learn", "Prerequisites"]
      
    - name: "Prerequisites"
      required: true
      objectives: ["Required knowledge", "Tools needed"]
      
    - name: "Steps"
      required: true
      word_count: [1500, 3000]
      subsections: "Step 1, Step 2, ..."
      objectives:
        - "Clear instructions"
        - "Code examples"
        - "Screenshots/diagrams"
      
    - name: "Troubleshooting"
      required: true
      word_count: [200, 400]
      objectives: ["Common issues and solutions"]
      
    - name: "Conclusion"
      required: true
      word_count: [100, 200]
      objectives: ["Summary", "Next steps"]
      
    - name: "Additional Resources"
      required: true

# Review Template  
review:
  name: "Product/Technology Review"
  description: "Comprehensive review with pros/cons"
  target_length_range: [1500, 3000]
  
  sections:
    - name: "Introduction"
      required: true
      word_count: [200, 300]
      objectives: ["What is being reviewed", "Context"]
      
    - name: "Overview"
      required: true
      word_count: [300, 500]
      objectives: ["Key features", "Target audience"]
      
    - name: "Detailed Analysis"
      required: true
      word_count: [800, 1500]
      objectives: ["In-depth examination", "Use cases"]
      
    - name: "Pros"
      required: true
      word_count: [200, 300]
      format: "bullet_points"
      
    - name: "Cons"
      required: true
      word_count: [200, 300]
      format: "bullet_points"
      
    - name: "Comparison"
      required: false
      word_count: [300, 500]
      objectives: ["Compare with alternatives"]
      
    - name: "Verdict"
      required: true
      word_count: [150, 250]
      objectives: ["Final recommendation", "Rating"]

# Template Selection Logic
template_selection:
  rules:
    - condition: "content_type == 'blog' AND topic contains ML/AI/System"
      template: "ml_system_design"
      
    - condition: "content_type == 'news'"
      template: "news_article"
      
    - condition: "content_type == 'tutorial'"
      template: "tutorial"
      
    - condition: "content_type == 'review'"
      template: "review"
      
    - condition: "default"
      template: "ml_system_design"

